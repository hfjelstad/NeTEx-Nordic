name: Validate Ontology

on:
  push:
    paths:
      - 'ontology/**'
      - 'Objects/**'
      - 'Frames/**'
      - 'Guides/**'
      - 'Examples/**'
      - 'scripts/validate_ontology.py'
      - 'scripts/validate_shacl.py'
      - 'scripts/validate_profile.py'
  pull_request:
    paths:
      - 'ontology/**'
      - 'Objects/**'
      - 'Frames/**'
      - 'Guides/**'
      - 'Examples/**'
      - 'scripts/validate_ontology.py'
      - 'scripts/validate_shacl.py'
      - 'scripts/validate_profile.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install rdflib lxml pyshacl

      - name: Validate ontology integrity
        run: python scripts/validate_ontology.py

      - name: Validate SHACL shapes
        run: python scripts/validate_shacl.py

      - name: Validate profile compliance
        run: python scripts/validate_profile.py
