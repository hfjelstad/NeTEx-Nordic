<svg width="100%" viewBox="0 0 780 210" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NeTEx Nordic: Stop assignment chain</title>
<desc>Shows how ScheduledStopPoint connects to physical infrastructure via PassengerStopAssignment, Quay, and StopPlace.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <linearGradient id="grad-ssp" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#42A5F5"/>
    <stop offset="100%" stop-color="#1E88E5"/>
  </linearGradient>
  <linearGradient id="grad-psa" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#64B5F6"/>
    <stop offset="100%" stop-color="#42A5F5"/>
  </linearGradient>
  <linearGradient id="grad-quay" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1976D2"/>
    <stop offset="100%" stop-color="#1565C0"/>
  </linearGradient>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
  </filter>
</defs>

<!-- Background -->
<rect width="780" height="210" rx="12" fill="#FAFAFA"/>

<!-- Domain labels -->
<rect x="20" y="12" width="200" height="22" rx="4" fill="#E3F2FD"/>
<text x="120" y="27" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#1565C0">TIMETABLE DOMAIN</text>

<rect x="560" y="12" width="200" height="22" rx="4" fill="#E8EAF6"/>
<text x="660" y="27" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#283593">STOP REGISTRY</text>

<!-- Dashed domain boundary -->
<line x1="390" y1="42" x2="390" y2="198" stroke="#B0BEC5" stroke-width="1" stroke-dasharray="4 3"/>

<!-- StopPlace container (drawn first, behind Quay) -->
<rect x="500" y="50" width="260" height="130" rx="14" fill="#E8EAF6" stroke="#0D47A1" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
<text x="630" y="170" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#0D47A1">StopPlace</text>
<text x="630" y="186" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" font-style="italic" fill="#1565C0">Station / stop area</text>

<!-- ScheduledStopPoint box -->
<rect x="30" y="75" width="180" height="70" rx="10" fill="url(#grad-ssp)" filter="url(#shadow)"/>
<text x="120" y="103" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#fff">ScheduledStopPoint</text>
<text x="120" y="123" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.85)">Logical stop</text>

<!-- PassengerStopAssignment box -->
<rect x="260" y="75" width="210" height="70" rx="10" fill="url(#grad-psa)" filter="url(#shadow)"/>
<text x="365" y="103" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#fff">PassengerStopAssignment</text>
<text x="365" y="123" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.85)">Maps logical → physical</text>

<!-- Quay box -->
<rect x="540" y="75" width="180" height="70" rx="10" fill="url(#grad-quay)" filter="url(#shadow)"/>
<text x="630" y="103" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#fff">Quay</text>
<text x="630" y="123" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.85)">Platform / boarding position</text>

<!-- Arrow: SSP → PSA -->
<line x1="210" y1="110" x2="258" y2="110" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow)"/>
<text x="234" y="102" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#546E7A">ref</text>

<!-- Arrow: PSA → Quay -->
<line x1="470" y1="110" x2="538" y2="110" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow)"/>
<text x="504" y="102" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#546E7A">QuayRef</text>
</svg>
