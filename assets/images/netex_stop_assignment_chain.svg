<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NeTEx Nordic: Stop assignment chain</title>
<desc>Shows how ScheduledStopPoint connects to physical infrastructure via PassengerStopAssignment, Quay, and StopPlace.</desc>
<defs>
  <marker id="arrow-intra" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(83, 74, 183)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-cross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(15, 110, 86)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== FRAME CONTAINERS ===== -->

<!-- ServiceFrame (timetable domain) -->
<rect x="15" y="18" width="330" height="175" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="180" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">ServiceFrame</text>

<!-- Stop Registry (external domain) -->
<rect x="380" y="18" width="285" height="175" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="523" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">Stop Registry (NSR)</text>

<!-- ===== BOXES ===== -->

<!-- ScheduledStopPoint (Domain A – timetable) -->
<g>
  <rect x="30" y="60" width="185" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="123" y="82" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">ScheduledStopPoint</text>
  <text x="123" y="102" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Logical stop</text>
</g>

<!-- PassengerStopAssignment (Domain A – bridges both) -->
<g>
  <rect x="30" y="138" width="220" height="46" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="140" y="165" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">PassengerStopAssignment</text>
</g>

<!-- Quay (Domain B – stop registry) -->
<g>
  <rect x="395" y="60" width="120" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="455" y="82" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(159, 225, 203)">Quay</text>
  <text x="455" y="102" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(93, 202, 165)">Platform</text>
</g>

<!-- StopPlace (Domain B – stop registry) -->
<g>
  <rect x="540" y="60" width="110" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="595" y="82" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(159, 225, 203)">StopPlace</text>
  <text x="595" y="102" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(93, 202, 165)">Station / area</text>
</g>

<!-- ===== ARROWS ===== -->

<!-- SSP → PSA (intra-domain, vertical) -->
<line x1="123" y1="116" x2="123" y2="136" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arrow-intra)"/>
<text x="155" y="128" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">ref</text>

<!-- PSA → Quay (cross-domain) -->
<line x1="250" y1="161" x2="393" y2="88" stroke="rgb(15, 110, 86)" stroke-width="1" opacity="0.7" marker-end="url(#arrow-cross)"/>
<text x="310" y="116" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">QuayRef</text>

<!-- Quay → StopPlace (intra stop-registry) -->
<line x1="515" y1="88" x2="538" y2="88" stroke="rgb(15, 110, 86)" stroke-width="1" opacity="0.7" marker-end="url(#arrow-cross)"/>
<text x="527" y="80" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="400" fill="rgb(194, 192, 182)">in</text>

<!-- ===== LEGEND ===== -->
<text x="48" y="210" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="rgb(194, 192, 182)">TimetableFrame</text>
<text x="185" y="210" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="rgb(194, 192, 182)">ServiceCalendarFrame</text>
<text x="365" y="210" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="rgb(194, 192, 182)">ServiceFrame</text>
</svg>
