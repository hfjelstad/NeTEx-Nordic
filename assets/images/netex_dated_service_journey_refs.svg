<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NeTEx Nordic: DatedServiceJourney references</title>
<desc>Shows how DatedServiceJourney references a ServiceJourney (template with times) and an OperatingDay (calendar date).</desc>
<defs>
  <marker id="arrow-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(83, 74, 183)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(15, 110, 86)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== FRAME CONTAINERS ===== -->

<!-- TimetableFrame -->
<rect x="15" y="18" width="430" height="155" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="230" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">TimetableFrame</text>

<!-- ServiceCalendarFrame -->
<rect x="470" y="18" width="195" height="155" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="568" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">ServiceCalendarFrame</text>

<!-- ===== BOXES ===== -->

<!-- DatedServiceJourney (Domain A – timetable) -->
<g>
  <rect x="30" y="55" width="210" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="135" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">DatedServiceJourney</text>
  <text x="135" y="96" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Instance for a date</text>
</g>

<!-- ServiceJourney (Domain A – timetable) -->
<g>
  <rect x="75" y="130" width="175" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="163" y="151" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">ServiceJourney</text>
  <text x="163" y="171" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Template with times</text>
</g>

<!-- OperatingDay (Domain B – calendar) -->
<g>
  <rect x="495" y="55" width="145" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="568" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(159, 225, 203)">OperatingDay</text>
  <text x="568" y="96" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(93, 202, 165)">2026-06-01</text>
</g>

<!-- ===== ARROWS ===== -->

<!-- DSJ → ServiceJourney (intra-domain) -->
<line x1="120" y1="111" x2="140" y2="128" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arrow-a)"/>
<text x="85" y="125" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">ServiceJourneyRef</text>

<!-- DSJ → OperatingDay (cross-domain) -->
<line x1="240" y1="83" x2="493" y2="83" stroke="rgb(15, 110, 86)" stroke-width="1" opacity="0.7" marker-end="url(#arrow-b)"/>
<text x="367" y="76" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(194, 192, 182)">OperatingDayRef</text>
</svg>
