<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NeTEx Calendar Objects</title>
<desc>Two scheduling mechanisms: date-based (DatedServiceJourney references OperatingDay) and pattern-based (DayTypeAssignment references DayType and OperatingPeriod). ServiceJourney bridges both — referenced by DatedServiceJourney and references DayType.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(83, 74, 183)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(15, 110, 86)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(200, 155, 50)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== FRAME: Date-based (recommended) ===== -->
<rect x="20" y="40" width="270" height="200" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="155" y="60" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(194, 192, 182)">DATE-BASED (recommended)</text>

<!-- OperatingDay -->
<g>
  <rect x="45" y="75" width="220" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="155" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(159, 225, 203)">OperatingDay</text>
  <text x="155" y="115" text-anchor="middle" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="rgb(93, 202, 165)">Single date — e.g. 2026-03-18</text>
</g>

<!-- DatedServiceJourney -->
<g>
  <rect x="45" y="160" width="220" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="155" y="182" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(159, 225, 203)">DatedServiceJourney</text>
  <text x="155" y="200" text-anchor="middle" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="rgb(93, 202, 165)">Instance on a specific date</text>
</g>

<!-- Arrow: DatedServiceJourney → OperatingDay (OperatingDayRef) -->
<line x1="120" y1="160" x2="120" y2="129" stroke="rgb(15, 110, 86)" stroke-width="1" opacity="0.7" marker-end="url(#arr-green)"/>
<text x="60" y="147" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93, 202, 165)">OperatingDayRef</text>

<!-- ===== FRAME: Pattern-based ===== -->
<!-- Layout: DayTypeAssignment on TOP, DayType and OperatingPeriod below it -->
<rect x="390" y="40" width="270" height="200" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="525" y="60" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(194, 192, 182)">PATTERN-BASED (recurring)</text>

<!-- DayTypeAssignment — TOP of pattern frame -->
<g>
  <rect x="430" y="75" width="200" height="52" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="530" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgb(206, 203, 246)">DayTypeAssignment</text>
  <text x="530" y="114" text-anchor="middle" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175, 169, 236)">The glue · isAvailable</text>
</g>

<!-- DayType — bottom-left of pattern frame -->
<g>
  <rect x="410" y="160" width="110" height="52" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="465" y="182" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgb(206, 203, 246)">DayType</text>
  <text x="465" y="199" text-anchor="middle" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175, 169, 236)">Weekdays</text>
</g>

<!-- OperatingPeriod — bottom-right of pattern frame -->
<g>
  <rect x="535" y="160" width="115" height="52" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="593" y="182" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(206, 203, 246)">OperatingPeriod</text>
  <text x="593" y="199" text-anchor="middle" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175, 169, 236)">Jan 1 – Jun 30</text>
</g>

<!-- Arrow: DayTypeAssignment → DayType (DayTypeRef) — down-left -->
<line x1="490" y1="127" x2="475" y2="158" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arr)"/>
<text x="462" y="145" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175, 169, 236)">DayTypeRef</text>

<!-- Arrow: DayTypeAssignment → OperatingPeriod (OperatingPeriodRef) — down-right -->
<line x1="575" y1="127" x2="585" y2="158" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arr)"/>
<text x="595" y="145" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175, 169, 236)">OperatingPeriodRef</text>

<!-- ===== ServiceJourney — centered, distinct amber color ===== -->
<g>
  <rect x="245" y="278" width="190" height="48" rx="8" fill="rgb(120, 70, 10)" stroke="rgb(220, 170, 60)" stroke-width="0.5"/>
  <text x="340" y="299" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(245, 215, 130)">ServiceJourney</text>
  <text x="340" y="316" text-anchor="middle" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="rgb(220, 170, 60)">Template — bridges both</text>
</g>

<!-- Arrow: DatedServiceJourney → ServiceJourney (ServiceJourneyRef) — down-right -->
<path d="M 200 212 C 235 248, 275 268, 300 278" fill="none" stroke="rgb(15, 110, 86)" stroke-width="1" opacity="0.7" marker-end="url(#arr-green)"/>
<text x="210" y="260" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93, 202, 165)">ServiceJourneyRef</text>

<!-- Arrow: ServiceJourney → DayType (DayTypeRef) — up-right, straight to DayType (below DTA) -->
<path d="M 395 278 C 420 260, 445 235, 460 214" fill="none" stroke="rgb(200, 155, 50)" stroke-width="1" opacity="0.7" marker-end="url(#arr-amber)"/>
<text x="430" y="252" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="rgb(220, 170, 60)">DayTypeRef</text>

</svg>
