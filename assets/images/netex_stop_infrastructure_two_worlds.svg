<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NeTEx Nordic: The Two Worlds of Stops</title>
<desc>Diagram showing how the logical world (ScheduledStopPoint in ServiceFrame) connects to the physical world (StopPlace and Quays in SiteFrame) via PassengerStopAssignment.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== FRAME CONTAINERS ===== -->

<!-- ServiceFrame (Logical World) -->
<rect x="20" y="20" width="270" height="300" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="155" y="44" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400">ServiceFrame — Logical World</text>

<!-- SiteFrame (Physical World) -->
<rect x="390" y="20" width="270" height="300" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="525" y="44" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400">SiteFrame — Physical World</text>

<!-- ===== LOGICAL WORLD BOXES ===== -->

<!-- ScheduledStopPoint -->
<g onclick="sendPrompt('Fortell meg mer om ScheduledStopPoint i NeTEx Nordic')">
  <rect x="55" y="80" width="200" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="155" y="100" text-anchor="middle" dominant-baseline="central" fill="rgb(206, 203, 246)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">ScheduledStopPoint</text>
  <text x="155" y="120" text-anchor="middle" dominant-baseline="central" fill="rgb(175, 169, 236)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" font-style="italic">Oslo S (logical)</text>
</g>

<!-- PassengerStopAssignment -->
<g onclick="sendPrompt('Fortell meg mer om PassengerStopAssignment i NeTEx Nordic')">
  <rect x="40" y="200" width="230" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="155" y="220" text-anchor="middle" dominant-baseline="central" fill="rgb(206, 203, 246)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">PassengerStopAssignment</text>
  <text x="155" y="240" text-anchor="middle" dominant-baseline="central" fill="rgb(175, 169, 236)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" font-style="italic">The bridge</text>
</g>

<!-- ===== PHYSICAL WORLD BOXES ===== -->

<!-- StopPlace -->
<g onclick="sendPrompt('Fortell meg mer om StopPlace i NeTEx Nordic')">
  <rect x="425" y="70" width="200" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="525" y="90" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">StopPlace</text>
  <text x="525" y="110" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" font-style="italic">Oslo S (station)</text>
</g>

<!-- Quay Spor 1 -->
<g onclick="sendPrompt('Fortell meg mer om Quay i NeTEx Nordic')">
  <rect x="425" y="155" width="200" height="44" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="525" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Quay — Spor 1</text>
</g>

<!-- Quay Spor 2 -->
<g onclick="sendPrompt('Fortell meg mer om Quay i NeTEx Nordic')">
  <rect x="425" y="215" width="200" height="44" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="525" y="237" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Quay — Spor 2</text>
</g>

<!-- Quay Spor 3 -->
<g onclick="sendPrompt('Fortell meg mer om Quay i NeTEx Nordic')">
  <rect x="425" y="275" width="200" height="44" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="525" y="297" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">Quay — Spor 3</text>
</g>

<!-- ===== INTRA-DOMAIN ARROWS ===== -->

<!-- ScheduledStopPoint -> PassengerStopAssignment -->
<line x1="155" y1="136" x2="155" y2="198" stroke="rgb(83, 74, 183)" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>
<text x="165" y="172" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400">SSP ref</text>

<!-- StopPlace -> Quay 1 -->
<line x1="525" y1="126" x2="525" y2="153" stroke="rgb(15, 110, 86)" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>

<!-- StopPlace -> Quay 2 -->
<line x1="545" y1="126" x2="545" y2="213" stroke="rgb(15, 110, 86)" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>

<!-- StopPlace -> Quay 3 -->
<line x1="565" y1="126" x2="565" y2="273" stroke="rgb(15, 110, 86)" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>

<!-- ===== CROSS-DOMAIN ARROW ===== -->

<!-- PassengerStopAssignment -> Quay Spor 1 (the bridge) -->
<line x1="270" y1="222" x2="423" y2="177" stroke="rgb(15, 110, 86)" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.85"/>
<text x="340" y="192" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400">QuayRef</text>

<!-- ===== LEGEND ===== -->
<circle cx="42" cy="345" r="4" fill="rgb(83, 74, 183)" opacity="0.7"/>
<text x="52" y="349" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400">Operator's delivery</text>
<circle cx="200" cy="345" r="4" fill="rgb(15, 110, 86)" opacity="0.7"/>
<text x="210" y="349" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400">Stop registry</text>

</svg>
