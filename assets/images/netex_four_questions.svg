<svg width="100%" viewBox="0 0 680 120" role="img" xmlns="http://www.w3.org/2000/svg">
<title>NeTEx Nordic: Four timetable questions</title>
<desc>The four questions to answer when building a timetable: WHERE (stops), WHAT (line), IN WHAT ORDER (pattern), WHEN (times).</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(83, 74, 183)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== BOXES ===== -->

<!-- WHERE? -->
<g>
  <rect x="15" y="30" width="140" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="85" y="52" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">WHERE?</text>
  <text x="85" y="72" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Which stops?</text>
</g>

<!-- WHAT? -->
<g>
  <rect x="190" y="30" width="140" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="260" y="52" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">WHAT?</text>
  <text x="260" y="72" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Which line?</text>
</g>

<!-- IN WHAT ORDER? -->
<g>
  <rect x="365" y="30" width="150" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="440" y="52" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">IN WHAT ORDER?</text>
  <text x="440" y="72" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Stop sequence</text>
</g>

<!-- WHEN? -->
<g>
  <rect x="550" y="30" width="115" height="56" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="608" y="52" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206, 203, 246)">WHEN?</text>
  <text x="608" y="72" text-anchor="middle" dominant-baseline="central" font-style="italic" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="rgb(175, 169, 236)">Dates and times</text>
</g>

<!-- ===== ARROWS ===== -->

<!-- WHERE → WHAT -->
<line x1="155" y1="58" x2="188" y2="58" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>

<!-- WHAT → IN WHAT ORDER -->
<line x1="330" y1="58" x2="363" y2="58" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>

<!-- IN WHAT ORDER → WHEN -->
<line x1="515" y1="58" x2="548" y2="58" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>
</svg>
