<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,7 L7,1" fill="none" stroke="#334155" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-up" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,7 L4,1 L7,7" fill="none" stroke="#334155" stroke-width="1.5"/>
    </marker>
    <linearGradient id="feeder-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="dist-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="stop-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <!-- Feeder journey box -->
  <rect x="40" y="30" width="200" height="90" rx="12" fill="url(#feeder-grad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">FEEDER</text>
  <text x="140" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">ServiceJourney A</text>
  <text x="140" y="98" text-anchor="middle" font-size="11" fill="#475569">Bus line 100</text>

  <!-- Distributor journey box -->
  <rect x="440" y="30" width="200" height="90" rx="12" fill="url(#dist-grad)" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">DISTRIBUTOR</text>
  <text x="540" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">ServiceJourney B</text>
  <text x="540" y="98" text-anchor="middle" font-size="11" fill="#475569">Train RE 10</text>

  <!-- Arrows -->
  <line x1="140" y1="120" x2="140" y2="195" stroke="#334155" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="540" y1="195" x2="540" y2="120" stroke="#334155" stroke-width="2" marker-end="url(#arrow-up)"/>

  <!-- Arrow labels -->
  <text x="80" y="165" font-size="10" fill="#64748b">arrives at stop</text>
  <text x="548" y="165" font-size="10" fill="#64748b">departs from stop</text>

  <!-- Transfer stop -->
  <rect x="80" y="200" width="520" height="70" rx="14" fill="url(#stop-grad)" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">Transfer Stop</text>
  <text x="340" y="252" text-anchor="middle" font-size="12" fill="#92400e">Asker stasjon</text>

  <!-- Passenger walking path -->
  <path d="M 180 240 C 260 280, 420 280, 500 240" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="340" y="295" text-anchor="middle" font-size="10" font-style="italic" fill="#4338ca">passenger transfer</text>

  <!-- Interchange badge -->
  <rect x="235" y="132" width="210" height="28" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="340" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">ServiceJourneyInterchange</text>
</svg>
