<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="40%" stop-color="#1e40af"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="phase4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#334155" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Public Transport Service Lifecycle</text>

  <!-- DSJ bar spanning full width (created at beginning) -->
  <rect x="40" y="42" width="740" height="26" rx="13" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="410" y="59" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">DatedServiceJourney — created at start, versioned throughout</text>

  <!-- Main timeline track -->
  <rect x="40" y="148" width="740" height="6" rx="3" fill="url(#track)" opacity="0.8"/>

  <!-- Phase markers (circles on track) -->
  <circle cx="110" cy="151" r="10" fill="#1e3a5f" stroke="#fff" stroke-width="2"/>
  <circle cx="300" cy="151" r="10" fill="#1e40af" stroke="#fff" stroke-width="2"/>
  <circle cx="510" cy="151" r="10" fill="#7c3aed" stroke="#fff" stroke-width="2"/>
  <circle cx="700" cy="151" r="10" fill="#e11d48" stroke="#fff" stroke-width="2"/>

  <!-- Phase 1: Planning -->
  <rect x="40" y="78" width="170" height="54" rx="10" fill="url(#phase1)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">2+ YEARS BEFORE</text>
  <text x="125" y="112" text-anchor="middle" font-size="11" fill="#334155">Service created</text>
  <text x="125" y="126" text-anchor="middle" font-size="11" fill="#334155">Route applied for</text>

  <!-- Phase 2: Approval -->
  <rect x="220" y="78" width="170" height="54" rx="10" fill="url(#phase2)" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">~1 YEAR BEFORE</text>
  <text x="305" y="112" text-anchor="middle" font-size="11" fill="#334155">Times adjusted</text>
  <text x="305" y="126" text-anchor="middle" font-size="11" fill="#334155">IM approves timetable</text>

  <!-- Phase 3: Deviations -->
  <rect x="410" y="78" width="170" height="54" rx="10" fill="url(#phase3)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">DEVIATIONS</text>
  <text x="495" y="112" text-anchor="middle" font-size="11" fill="#334155">Cancellations</text>
  <text x="495" y="126" text-anchor="middle" font-size="11" fill="#334155">Replacements</text>

  <!-- Phase 4: Real-time -->
  <rect x="600" y="78" width="180" height="54" rx="10" fill="url(#phase4)" stroke="#e11d48" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#9f1239">REAL-TIME</text>
  <text x="690" y="112" text-anchor="middle" font-size="11" fill="#334155">SIRI updates</text>
  <text x="690" y="126" text-anchor="middle" font-size="11" fill="#334155">Day of operation</text>

  <!-- Version annotations below track -->
  <rect x="40" y="170" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="105" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">DSJ created</text>
  <text x="105" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">version 1</text>

  <rect x="220" y="170" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="285" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">IM adjusts</text>
  <text x="285" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">version 2</text>

  <rect x="410" y="170" width="130" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="475" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Deviation</text>
  <text x="475" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">version 3</text>

  <rect x="600" y="170" width="130" height="44" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
  <text x="665" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#9f1239">Real-time</text>
  <text x="665" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#e11d48">version 4</text>

  <!-- Arrows between version boxes -->
  <path d="M 170 192 L 218 192" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 350 192 L 408 192" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 540 192 L 598 192" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sales window bracket below -->
  <line x1="40" y1="235" x2="40" y2="248" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="40" y1="248" x2="780" y2="248" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="780" y1="235" x2="780" y2="248" stroke="#dc2626" stroke-width="1.5"/>
  <text x="410" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Sales window — tickets sold from DSJ creation (before IM approval)</text>
  <text x="410" y="284" text-anchor="middle" font-size="10" fill="#64748b">DSJ.id is the stable sales anchor · version increments notify travelers</text>

  <!-- Bottom note -->
  <rect x="140" y="296" width="540" height="22" rx="11" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="311" text-anchor="middle" font-size="10" fill="#475569">ServiceJourney = template · DatedServiceJourney = concrete journey on a date (created early, evolved over time)</text>
</svg>
