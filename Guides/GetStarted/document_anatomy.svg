<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="gEnv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="gMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="gFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#78909c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" fill="#f8fafe" rx="12"/>

  <!-- PublicationDelivery -->
  <rect x="230" y="15" width="260" height="50" rx="8" fill="url(#gEnv)" filter="url(#sh)"/>
  <text x="360" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">PublicationDelivery</text>
  <text x="360" y="54" text-anchor="middle" font-size="9" fill="#bbdefb" font-style="italic">The envelope: who sent this, when?</text>

  <!-- Arrow -->
  <line x1="360" y1="65" x2="360" y2="85" stroke="#78909c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- dataObjects -->
  <rect x="290" y="88" width="140" height="32" rx="6" fill="url(#gMid)" filter="url(#sh)"/>
  <text x="360" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">dataObjects</text>

  <!-- Arrow -->
  <line x1="360" y1="120" x2="360" y2="140" stroke="#78909c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CompositeFrame -->
  <rect x="200" y="143" width="320" height="50" rx="8" fill="url(#gMid)" filter="url(#sh)"/>
  <text x="360" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">CompositeFrame</text>
  <text x="360" y="182" text-anchor="middle" font-size="9" fill="#bbdefb" font-style="italic">Groups all frames into one delivery</text>

  <!-- Branch: codespaces and frames -->
  <line x1="300" y1="193" x2="300" y2="215" stroke="#78909c" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="193" x2="430" y2="215" stroke="#78909c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- codespaces -->
  <rect x="220" y="218" width="160" height="32" rx="6" fill="#1976D2" filter="url(#sh)"/>
  <text x="300" y="237" text-anchor="middle" font-size="10" fill="#fff">codespaces</text>
  <text x="300" y="248" text-anchor="middle" font-size="8" fill="#bbdefb" font-style="italic">e.g. NP</text>

  <!-- frames -->
  <rect x="395" y="218" width="80" height="32" rx="6" fill="#1976D2" filter="url(#sh)"/>
  <text x="435" y="239" text-anchor="middle" font-size="10" fill="#fff">frames</text>

  <!-- Lines from frames to each frame box -->
  <line x1="435" y1="250" x2="100" y2="290" stroke="#78909c" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="435" y1="250" x2="200" y2="290" stroke="#78909c" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="435" y1="250" x2="310" y2="290" stroke="#78909c" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="435" y1="250" x2="415" y2="290" stroke="#78909c" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="435" y1="250" x2="520" y2="290" stroke="#78909c" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="435" y1="250" x2="620" y2="290" stroke="#78909c" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Frame boxes -->
  <!-- ResourceFrame -->
  <rect x="30" y="293" width="145" height="55" rx="7" fill="url(#gFrame)" filter="url(#sh)"/>
  <text x="102" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">🏢 ResourceFrame</text>
  <text x="102" y="330" text-anchor="middle" font-size="8.5" fill="#e3f2fd">Organizations</text>
  <text x="102" y="342" text-anchor="middle" font-size="8.5" fill="#e3f2fd">operators</text>

  <!-- SiteFrame -->
  <rect x="130" y="360" width="145" height="55" rx="7" fill="url(#gFrame)" filter="url(#sh)"/>
  <text x="202" y="381" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">📍 SiteFrame</text>
  <text x="202" y="397" text-anchor="middle" font-size="8.5" fill="#e3f2fd">Stop places</text>
  <text x="202" y="409" text-anchor="middle" font-size="8.5" fill="#e3f2fd">facilities</text>

  <!-- ServiceCalendarFrame -->
  <rect x="240" y="293" width="145" height="55" rx="7" fill="url(#gFrame)" filter="url(#sh)"/>
  <text x="312" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">📅 CalendarFrame</text>
  <text x="312" y="330" text-anchor="middle" font-size="8.5" fill="#e3f2fd">Day types</text>
  <text x="312" y="342" text-anchor="middle" font-size="8.5" fill="#e3f2fd">calendars</text>

  <!-- ServiceFrame -->
  <rect x="345" y="360" width="145" height="55" rx="7" fill="url(#gFrame)" filter="url(#sh)"/>
  <text x="417" y="381" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">🚌 ServiceFrame</text>
  <text x="417" y="397" text-anchor="middle" font-size="8.5" fill="#e3f2fd">Lines, routes</text>
  <text x="417" y="409" text-anchor="middle" font-size="8.5" fill="#e3f2fd">patterns</text>

  <!-- TimetableFrame -->
  <rect x="450" y="293" width="145" height="55" rx="7" fill="url(#gFrame)" filter="url(#sh)"/>
  <text x="522" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">🕐 TimetableFrame</text>
  <text x="522" y="330" text-anchor="middle" font-size="8.5" fill="#e3f2fd">Journeys</text>
  <text x="522" y="342" text-anchor="middle" font-size="8.5" fill="#e3f2fd">timetables</text>

  <!-- VehicleScheduleFrame + FareFrame -->
  <rect x="555" y="360" width="145" height="55" rx="7" fill="url(#gFrame)" filter="url(#sh)"/>
  <text x="627" y="381" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">🚃 VehicleSchedule</text>
  <text x="627" y="397" text-anchor="middle" font-size="8.5" fill="#e3f2fd">Blocks, vehicle</text>
  <text x="627" y="409" text-anchor="middle" font-size="8.5" fill="#e3f2fd">assignments</text>

  <!-- Caption -->
  <text x="360" y="460" text-anchor="middle" font-size="9.5" fill="#546e7a">Every NeTEx file follows this structure: PublicationDelivery → CompositeFrame → domain-specific frames</text>
</svg>