<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic NeTEx Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #1976D2;
      --content-max-width: 900px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --base-background-color: #1a1a2e;
        --base-color: #e0e0e0;
        --sidebar-background: #16162a;
        --sidebar-nav-link-color--active: #64B5F6;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Nordic NeTEx Profile',
      repo: 'hfjelstad/NeTEx-Nordic',
      loadSidebar: true,
      relativePath: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search...',
        noData: 'No results',
        depth: 3
      },
      tabs: {
        persist: true,
        sync: true
      },
      flexible_alerts: {
        style: 'callout'
      }
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@1"></script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    window.$docsify.markdown = {
      renderer: {
        code: function(code, lang) {
          if (lang === 'mermaid') {
            return '<div class="mermaid">' + code + '</div>';
          }
          return this.origin.code.apply(this, arguments);
        }
      }
    };
    // Render mermaid after page change
    var defined = false;
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function(hook) {
      hook.doneEach(function() {
        mermaid.run({ querySelector: '.mermaid' });
      });
    });
  </script>

  <!-- Glossary tooltips -->
  <script src="assets/docsify-glossary-tooltip.js"></script>
</body>
</html>
